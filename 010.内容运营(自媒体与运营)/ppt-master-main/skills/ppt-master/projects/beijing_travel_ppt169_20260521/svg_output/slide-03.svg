<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DCFCE7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Title bar - forest green -->
  <rect width="1280" height="100" fill="#2E8B57"/>
  <text x="50" y="65" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">Day 2：八达岭长城</text>
  <text x="1230" y="65" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="18" fill="#90EE90" text-anchor="end" font-weight="bold">DAY 2</text>

  <!-- Left card -->
  <rect x="40" y="130" width="580" height="450" rx="20" fill="#FFFFFF" stroke="#2E8B57" stroke-width="2"/>
  <text x="70" y="170" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="28" font-weight="bold" fill="#1E3A5F">🏔️ 第二站：八达岭长城</text>

  <!-- Info items -->
  <text x="70" y="220" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="18" fill="#5A6978">🎫 门票：40元（学生20元）</text>
  <text x="70" y="260" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="18" fill="#5A6978">⏰ 建议游览：3-4小时</text>
  <text x="70" y="300" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="18" fill="#5A6978">👣 亮点：登长城做好汉、春日踏青</text>
  <text x="70" y="340" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="18" fill="#5A6978">🚠 索道：单程100元/双程140元</text>
  <text x="70" y="380" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="18" fill="#5A6978">🧗 难度：南坡较缓，北坡较陡</text>

  <!-- Tips card -->
  <rect x="70" y="430" width="520" height="120" rx="15" fill="#90EE90" opacity="0.2"/>
  <text x="90" y="465" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="20" font-weight="bold" fill="#2E8B57">💡 小贴士</text>
  <text x="90" y="500" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="16" fill="#5A6978">• 建议穿舒适运动鞋</text>
  <text x="90" y="530" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="16" fill="#5A6978">• 带足水和简易食物</text>

  <!-- Right image placeholder rect -->
  <rect x="650" y="140" width="590" height="430" rx="15" fill="#DCFCE7"/>
  <text x="945" y="360" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="24" fill="#2E8B57" text-anchor="middle">[配图区域]</text>
  <text x="945" y="400" font-family="Microsoft YaHei, Noto Sans SC, sans-serif" font-size="16" fill="#5A6978" text-anchor="middle">beijing_greatwall.png</text>
</svg>