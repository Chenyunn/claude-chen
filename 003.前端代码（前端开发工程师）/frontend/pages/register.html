<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 每日记账</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <style>
    .register-page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: max(var(--space-md), env(safe-area-inset-top, 0px)) var(--space-md) max(var(--space-md), env(safe-area-inset-bottom, 0px));
      background: var(--color-surface);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .register-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface-container-lowest);
      border-radius: var(--radius-xxl);
      box-shadow: var(--shadow-card);
      padding: var(--space-xl);
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .register-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .register-logo {
      width: 64px;
      height: 64px;
      background: var(--color-pale-pink-white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-md);
      box-shadow: 0 8px 32px rgba(201, 184, 232, 0.15);
    }

    .register-logo span {
      font-size: 32px;
    }

    .register-title {
      background: linear-gradient(135deg, var(--color-primary-container), var(--color-secondary-container));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .register-subtitle {
      color: var(--color-on-surface-variant);
      margin-top: var(--space-xs);
    }

    .form-row {
      margin-bottom: var(--space-lg);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: var(--space-md);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-outline);
      transition: color var(--transition-fast);
    }

    .input-wrapper:focus-within .input-icon {
      color: var(--color-primary);
    }

    .input-with-icon {
      padding-left: 48px;
    }

    .password-toggle {
      position: absolute;
      right: var(--space-md);
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-outline);
      cursor: pointer;
      padding: 4px;
    }

    .password-toggle:hover {
      color: var(--color-on-surface-variant);
    }

    .input-error-hint {
      font-size: 12px;
      color: var(--color-error);
      margin-top: var(--space-xs);
      min-height: 18px;
    }

    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }

    .terms-checkbox {
      margin-top: 2px;
    }

    .terms-text {
      font-size: var(--font-size-body-sm);
      color: var(--color-on-surface-variant);
      line-height: 1.5;
    }

    .terms-link {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: var(--font-weight-semibold);
    }

    .terms-link:hover {
      text-decoration: underline;
    }

    .register-btn {
      width: 100%;
      height: 56px;
      font-size: var(--font-size-h3);
      border-radius: var(--radius-full);
    }

    .register-footer {
      text-align: center;
      margin-top: var(--space-xl);
    }

    .register-footer p {
      font-size: var(--font-size-body-sm);
      color: var(--color-outline);
    }

    .login-link {
      color: var(--color-primary);
      font-weight: var(--font-weight-semibold);
      text-decoration: none;
      margin-left: var(--space-xs);
    }

    .login-link:hover {
      text-decoration: underline;
    }

    .features-row {
      display: flex;
      justify-content: center;
      gap: var(--space-xl);
      margin-top: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-outline-variant);
    }

    .feature-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
      color: var(--color-outline);
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      background: var(--color-surface-container-high);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feature-text {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .shake {
      animation: shake 0.3s ease;
    }

    .password-toggle {
      flex-shrink: 0;
    }

    .input-with-action {
      padding-right: 48px;
    }

    @media (min-width: 769px) and (min-height: 760px) {
      .register-page {
        align-items: center;
      }
    }

    @media (max-width: 480px) {
      .register-card {
        padding: var(--space-lg);
        border-radius: var(--radius-xl);
      }

      .register-header {
        margin-bottom: var(--space-lg);
      }

      .form-row {
        margin-bottom: var(--space-md);
      }

      .features-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--space-md);
      }
    }

    @media (max-width: 375px) {
      .register-card {
        padding: var(--space-md);
      }

      .feature-icon {
        width: 36px;
        height: 36px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .register-card,
      .shake {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="register-page">
    <div class="register-card">
      <!-- Header -->
      <div class="register-header">
        <div class="register-logo">
          <span>💰</span>
        </div>
        <h1 class="register-title">财务管家</h1>
        <p class="register-subtitle">开启智能理财之旅</p>
      </div>

      <!-- Register Form -->
      <form id="register-form">
        <div class="form-row">
          <div class="input-group">
            <label class="input-label" for="username">用户名</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">person</span>
              <input
                type="text"
                id="username"
                class="input input-with-icon"
                placeholder="6-20位字母或数字"
                maxlength="20"
                autocomplete="username"
                required
              >
            </div>
            <div class="input-error-hint" id="username-error"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label class="input-label" for="password">设置密码</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">lock</span>
              <input
                type="password"
                id="password"
                class="input input-with-icon input-with-action"
                placeholder="6-16位密码"
                maxlength="16"
                autocomplete="new-password"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
            <div class="input-error-hint" id="password-error"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label class="input-label" for="confirm-password">确认密码</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">lock_reset</span>
              <input
                type="password"
                id="confirm-password"
                class="input input-with-icon input-with-action"
                placeholder="再次输入密码"
                maxlength="16"
                autocomplete="new-password"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
            <div class="input-error-hint" id="confirm-password-error"></div>
          </div>
        </div>

        <div class="terms-row">
          <input type="checkbox" id="terms" class="terms-checkbox" required>
          <label class="terms-text" for="terms">
            我已阅读并同意
            <a href="#" class="terms-link">服务协议</a>
            与
            <a href="#" class="terms-link">隐私政策</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary register-btn">
          立即注册
        </button>
      </form>

      <!-- Footer -->
      <div class="register-footer">
        <p>
          已有账号？
          <a href="login.html" class="login-link">返回登录</a>
        </p>
      </div>

      <!-- Features -->
      <div class="features-row">
        <div class="feature-item">
          <div class="feature-icon">
            <span class="material-symbols-outlined">security</span>
          </div>
          <span class="feature-text">银行级加密</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">
            <span class="material-symbols-outlined">verified_user</span>
          </div>
          <span class="feature-text">合规存管</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">
            <span class="material-symbols-outlined">cloud_done</span>
          </div>
          <span class="feature-text">实时同步</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      var form = document.getElementById('register-form');
      var submitBtn = form.querySelector('button[type="submit"]');
      var originalBtnText = submitBtn.textContent;

      // 如果已登录，直接跳转首页
      if (api.getToken()) {
        auth.checkAuth().then(function (ok) {
          if (ok) window.location.replace('../index.html');
        });
      }

      /**
       * 显示字段错误
       */
      function showFieldError(fieldId, message) {
        var input = document.getElementById(fieldId);
        var errorEl = document.getElementById(fieldId + '-error');
        errorEl.textContent = message;
        input.classList.add('input-error');
        input.classList.add('shake');
        setTimeout(function () { input.classList.remove('shake'); }, 300);
      }

      /**
       * 清除所有字段错误
       */
      function clearErrors() {
        ['username', 'password', 'confirm-password'].forEach(function (id) {
          document.getElementById(id + '-error').textContent = '';
          document.getElementById(id).classList.remove('input-error');
        });
      }

      /**
       * 设置按钮加载状态
       */
      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.textContent = '注册中...';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
        }
      }

      /**
       * 切换密码可见性
       */
      window.togglePassword = function (inputId, btn) {
        var input = document.getElementById(inputId);
        var icon = btn.querySelector('.material-symbols-outlined');

        if (input.type === 'password') {
          input.type = 'text';
          icon.textContent = 'visibility_off';
        } else {
          input.type = 'password';
          icon.textContent = 'visibility';
        }
      };

      /**
       * 处理注册
       */
      async function handleRegister(event) {
        event.preventDefault();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirm-password').value;
        var terms = document.getElementById('terms');

        // 清除旧错误
        clearErrors();

        // 前端校验
        var hasError = false;
        var usernameRegex = /^[a-zA-Z0-9]{6,20}$/;

        if (!username) {
          showFieldError('username', '用户名不能为空');
          hasError = true;
        } else if (!usernameRegex.test(username)) {
          showFieldError('username', '用户名需6-20位字母或数字');
          hasError = true;
        }

        if (!password) {
          showFieldError('password', '密码不能为空');
          hasError = true;
        } else if (password.length < 6 || password.length > 20) {
          showFieldError('password', '密码需6-20位');
          hasError = true;
        }

        if (password !== confirmPassword) {
          showFieldError('confirm-password', '两次输入的密码不一致');
          hasError = true;
        }

        if (!terms.checked) {
          Toast.warning('请先阅读并同意服务协议和隐私政策');
          hasError = true;
        }

        if (hasError) {
          document.querySelectorAll('.input-error').forEach(function (el) {
            el.classList.add('shake');
            setTimeout(function () { el.classList.remove('shake'); }, 300);
          });
          return false;
        }

        // 调用后端 API
        setLoading(true);

        try {
          var result = await auth.register({
            username: username,
            password: password,
          });

          Toast.success('注册成功！欢迎加入，正在跳转...', 1500);
          setTimeout(function () {
            window.location.href = '../index.html';
          }, 800);
        } catch (err) {
          var msg = err.message || '注册失败，请重试';

          if (err.code === 409) {
            // 用户名已存在
            showFieldError('username', msg);
            Toast.error(msg, 4000);
          } else if (err.code === 422 && err.errors) {
            // 字段校验错误
            err.errors.forEach(function (e) {
              if (e.field === 'username') showFieldError('username', e.message);
              if (e.field === 'password') showFieldError('password', e.message);
            });
          } else {
            Toast.error(msg);
          }
        } finally {
          setLoading(false);
        }

        return false;
      }

      // 绑定表单提交
      form.addEventListener('submit', handleRegister);
    })();
  </script>
</body>
</html>
