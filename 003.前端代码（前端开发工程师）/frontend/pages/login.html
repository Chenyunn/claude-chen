<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 每日记账</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <style>
    /* Login Page Specific Styles */
    .login-page {
      height: 100vh;
      height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(var(--space-md), env(safe-area-inset-top, 0px)) var(--space-md) max(var(--space-md), env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, var(--color-pale-pink-white) 0%, var(--color-surface) 100%);
      position: relative;
      overflow: hidden;
    }

    .login-page::before,
    .login-page::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
    }

    .login-page::before {
      top: -20%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: var(--color-primary-container);
    }

    .login-page::after {
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: var(--color-secondary-container);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface-container-lowest);
      border-radius: var(--radius-xxl);
      box-shadow: var(--shadow-soft-glow);
      padding: var(--space-xl);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .login-logo {
      font-size: 48px;
      margin-bottom: var(--space-md);
    }

    .login-title {
      color: var(--color-primary);
    }

    .login-subtitle {
      color: var(--color-outline);
      margin-top: var(--space-xs);
    }

    .form-row {
      margin-bottom: var(--space-lg);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: var(--space-md);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-outline);
      transition: color var(--transition-fast);
    }

    .input-wrapper:focus-within .input-icon {
      color: var(--color-primary);
    }

    .input-with-icon {
      padding-left: 48px;
    }

    .input-error-hint {
      font-size: 12px;
      color: var(--color-error);
      margin-top: var(--space-xs);
      min-height: 18px;
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      cursor: pointer;
      font-size: var(--font-size-body-sm);
      color: var(--color-on-surface-variant);
    }

    .checkbox-label input {
      display: none;
    }

    .checkbox-custom {
      width: 20px;
      height: 20px;
      border: 2px solid var(--color-outline-variant);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .checkbox-label input:checked + .checkbox-custom {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    .checkbox-label input:checked + .checkbox-custom::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .forgot-link {
      font-size: var(--font-size-body-sm);
      color: var(--color-primary);
      text-decoration: none;
      font-weight: var(--font-weight-semibold);
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      height: 56px;
      font-size: var(--font-size-h3);
      border-radius: var(--radius-full);
    }

    .login-footer {
      text-align: center;
      margin-top: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-outline-variant);
    }

    .login-footer p {
      font-size: var(--font-size-body-sm);
      color: var(--color-outline);
    }

    .register-link {
      color: var(--color-primary);
      font-weight: var(--font-weight-semibold);
      text-decoration: none;
      margin-left: var(--space-xs);
    }

    .register-link:hover {
      text-decoration: underline;
    }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      margin-top: var(--space-lg);
      color: var(--color-outline);
      font-size: var(--font-size-label-md);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .shake {
      animation: shake 0.3s ease;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: var(--space-lg);
        border-radius: var(--radius-xl);
      }

      .login-logo {
        font-size: 40px;
      }

      .login-header {
        margin-bottom: var(--space-lg);
      }

      .remember-row {
        flex-wrap: wrap;
        gap: var(--space-sm);
      }
    }

    @media (max-height: 700px) {
      .login-page {
        align-items: flex-start;
      }

      .login-card {
        margin-block: var(--space-md);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .login-card,
      .shake {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">💰</div>
        <h1 class="login-title">每日记账</h1>
        <p class="login-subtitle">一秒记账，清楚花钱</p>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-row">
          <div class="input-group">
            <label class="input-label" for="username">用户名</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">person</span>
              <input
                type="text"
                id="username"
                class="input input-with-icon"
                placeholder="请输入用户名"
                autocomplete="username"
                required
              >
            </div>
            <div class="input-error-hint" id="username-error"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label class="input-label" for="password">密码</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">lock</span>
              <input
                type="password"
                id="password"
                class="input input-with-icon"
                placeholder="请输入密码"
                autocomplete="current-password"
                required
              >
            </div>
            <div class="input-error-hint" id="password-error"></div>
          </div>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me">
            <span class="checkbox-custom"></span>
            <span>7天内免登录</span>
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary login-btn">
          <span>立即登录</span>
          <span class="material-symbols-outlined">login</span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>
          还没有账号？
          <a href="register.html" class="register-link">立即注册</a>
        </p>
      </div>

      <!-- Security Badge -->
      <div class="security-badge">
        <span class="material-symbols-outlined">verified_user</span>
        <span>银行级数据加密保护</span>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      const form = document.getElementById('login-form');
      const submitBtn = form.querySelector('button[type="submit"]');
      const btnText = submitBtn.querySelector('span:first-child');
      const btnIcon = submitBtn.querySelector('.material-symbols-outlined');
      const originalBtnText = btnText.textContent;

      // 如果已登录，直接跳转首页
      if (api.getToken()) {
        auth.checkAuth().then(function (ok) {
          if (ok) window.location.replace('../index.html');
        });
      }

      /**
       * 显示字段错误
       */
      function showFieldError(fieldId, message) {
        var input = document.getElementById(fieldId);
        var errorEl = document.getElementById(fieldId + '-error');
        errorEl.textContent = message;
        input.classList.add('input-error');
        input.classList.add('shake');
        setTimeout(function () { input.classList.remove('shake'); }, 300);
      }

      /**
       * 清除所有字段错误
       */
      function clearErrors() {
        ['username', 'password'].forEach(function (id) {
          document.getElementById(id + '-error').textContent = '';
          document.getElementById(id).classList.remove('input-error');
        });
      }

      /**
       * 设置按钮加载状态
       */
      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          btnText.textContent = '登录中...';
          btnIcon.textContent = 'hourglass_top';
        } else {
          submitBtn.disabled = false;
          btnText.textContent = originalBtnText;
          btnIcon.textContent = 'login';
        }
      }

      /**
       * 处理登录
       */
      async function handleLogin(event) {
        event.preventDefault();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var rememberMe = document.getElementById('remember-me').checked;

        // 清除旧错误
        clearErrors();

        // 前端校验
        var hasError = false;

        if (!username) {
          showFieldError('username', '请输入用户名');
          hasError = true;
        }

        if (!password) {
          showFieldError('password', '请输入密码');
          hasError = true;
        }

        if (hasError) return false;

        // 调用后端 API
        setLoading(true);

        try {
          await auth.login({ username: username, password: password, rememberMe: rememberMe });
          Toast.success('登录成功，正在跳转...', 1500);
          setTimeout(function () {
            window.location.href = '../index.html';
          }, 800);
        } catch (err) {
          var msg = err.message || '登录失败，请重试';

          // 根据错误码做特殊处理
          if (err.code === 423) {
            // 账号被锁定
            Toast.warning(msg, 5000);
          } else if (err.code === 403) {
            // 账号被禁用
            Toast.error(msg, 5000);
          } else if (err.code === 422 && err.errors) {
            // 字段校验错误 - 显示在对应字段下
            err.errors.forEach(function (e) {
              if (e.field === 'username') showFieldError('username', e.message);
              if (e.field === 'password') showFieldError('password', e.message);
            });
          } else {
            // 通用错误
            Toast.error(msg);
          }
        } finally {
          setLoading(false);
        }

        return false;
      }

      // 绑定表单提交
      form.addEventListener('submit', handleLogin);
    })();
  </script>
</body>
</html>
