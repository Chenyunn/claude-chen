# 财务管家后端配置
server:
  port: 8081
  servlet:
    context-path: /api

# Spring 数据源配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/daily_expense?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: FinanceHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.financemanager.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: finance-manager-secret-key-for-jwt-token-authentication-2024
  expiration: 86400000  # 默认过期时间 24小时 = 86400秒 * 1000毫秒
  remember-me-expiration: 604800000  # 记住我过期时间 7天 = 7*24*3600*1000毫秒

# 日志配置
logging:
  level:
    com.financemanager: debug
    com.financemanager.mapper: debug
