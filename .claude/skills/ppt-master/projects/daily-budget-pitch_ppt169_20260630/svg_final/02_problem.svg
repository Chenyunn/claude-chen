<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="glowPink2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B8A" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#FF6B8A" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#1A1320" />
    <circle cx="1180" cy="120" r="300" fill="url(#glowPink2)" />
  </g>

  <g id="header">
    <text x="80" y="92" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="18" font-weight="bold" fill="#FF6B8A" letter-spacing="2">问题 · THE PROBLEM</text>
    <text x="80" y="148" font-family="&quot;Microsoft YaHei&quot;, SimHei, sans-serif" font-size="44" font-weight="bold" fill="#EDE6EC">人人都想记账，<tspan fill="#FF8C6B">没人能坚持</tspan></text>
  </g>

  <g id="pain-1">
    <path fill="#241A2E" stroke="#3A2C44" stroke-width="1" d="M94,196 H626 A14,14 0 0 1 640,210 V274 A14,14 0 0 1 626,288 H94 A14,14 0 0 1 80,274 V210 A14,14 0 0 1 94,196 Z" />
    <path fill="#FF6B8A" d="M82,196 H82 A2,2 0 0 1 84,198 V286 A2,2 0 0 1 82,288 H82 A2,2 0 0 1 80,286 V198 A2,2 0 0 1 82,196 Z" />
    <circle cx="128" cy="242" r="24" fill="#FF6B8A" fill-opacity="0.14" />
    
  <g transform="translate(112, 226) scale(1.33333)" fill="#FF8FA6">
    <path d="M17 3.34a10 10 0 1 1 -14.995 8.984l-.005 -.324l.005 -.324a10 10 0 0 1 14.995 -8.336zm-5 2.66a1 1 0 0 0 -.993 .883l-.007 .117v5l.009 .131a1 1 0 0 0 .197 .477l.087 .1l3 3l.094 .082a1 1 0 0 0 1.226 0l.094 -.083l.083 -.094a1 1 0 0 0 0 -1.226l-.083 -.094l-2.707 -2.708v-4.585l-.007 -.117a1 1 0 0 0 -.993 -.883z" />
  </g>
    <text x="174" y="236" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" font-weight="bold" fill="#EDE6EC">步骤太繁琐</text>
    <text x="174" y="268" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="17" fill="#A99FB0">选账户、选分类、填备注，记一笔要点七八下</text>
  </g>

  <g id="pain-2">
    <path fill="#241A2E" stroke="#3A2C44" stroke-width="1" d="M94,300 H626 A14,14 0 0 1 640,314 V378 A14,14 0 0 1 626,392 H94 A14,14 0 0 1 80,378 V314 A14,14 0 0 1 94,300 Z" />
    <path fill="#FF6B8A" d="M82,300 H82 A2,2 0 0 1 84,302 V390 A2,2 0 0 1 82,392 H82 A2,2 0 0 1 80,390 V302 A2,2 0 0 1 82,300 Z" />
    <circle cx="128" cy="346" r="24" fill="#FF6B8A" fill-opacity="0.14" />
    
  <g transform="translate(112, 330) scale(1.33333)" fill="#FF8FA6">
    <path d="M17 3.34a10 10 0 1 1 -14.995 8.984l-.005 -.324l.005 -.324a10 10 0 0 1 14.995 -8.336zm-5 9.86a4.5 4.5 0 0 0 -3.214 1.35a1 1 0 1 0 1.428 1.4a2.5 2.5 0 0 1 3.572 0a1 1 0 0 0 1.428 -1.4a4.5 4.5 0 0 0 -3.214 -1.35zm-2.99 -4.2l-.127 .007a1 1 0 0 0 0 1.986l.117 .007l.127 -.007a1 1 0 0 0 0 -1.986l-.117 -.007zm6 0l-.127 .007a1 1 0 0 0 0 1.986l.117 .007l.127 -.007a1 1 0 0 0 0 -1.986l-.117 -.007z" />
  </g>
    <text x="174" y="340" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" font-weight="bold" fill="#EDE6EC">容易忘记</text>
    <text x="174" y="372" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="17" fill="#A99FB0">一天结束才想起没记，消费早就忘了</text>
  </g>

  <g id="pain-3">
    <path fill="#241A2E" stroke="#3A2C44" stroke-width="1" d="M94,404 H626 A14,14 0 0 1 640,418 V482 A14,14 0 0 1 626,496 H94 A14,14 0 0 1 80,482 V418 A14,14 0 0 1 94,404 Z" />
    <path fill="#FF6B8A" d="M82,404 H82 A2,2 0 0 1 84,406 V494 A2,2 0 0 1 82,496 H82 A2,2 0 0 1 80,494 V406 A2,2 0 0 1 82,404 Z" />
    <circle cx="128" cy="450" r="24" fill="#FF6B8A" fill-opacity="0.14" />
    
  <g transform="translate(112, 434) scale(1.33333)" fill="#FF8FA6">
    <path d="M10 2c0 -.88 1.056 -1.331 1.692 -.722c1.958 1.876 3.096 5.995 1.75 9.12l-.08 .174l.012 .003c.625 .133 1.203 -.43 2.303 -2.173l.14 -.224a1 1 0 0 1 1.582 -.153c1.334 1.435 2.601 4.377 2.601 6.27c0 4.265 -3.591 7.705 -8 7.705s-8 -3.44 -8 -7.706c0 -2.252 1.022 -4.716 2.632 -6.301l.605 -.589c.241 -.236 .434 -.43 .618 -.624c1.43 -1.512 2.145 -2.924 2.145 -4.78" />
  </g>
    <text x="174" y="444" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" font-weight="bold" fill="#EDE6EC">三分钟热度</text>
    <text x="174" y="476" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="17" fill="#A99FB0">下载一堆 App，一周后全部放弃</text>
  </g>

  <g id="pain-4">
    <path fill="#241A2E" stroke="#3A2C44" stroke-width="1" d="M94,508 H626 A14,14 0 0 1 640,522 V586 A14,14 0 0 1 626,600 H94 A14,14 0 0 1 80,586 V522 A14,14 0 0 1 94,508 Z" />
    <path fill="#FF6B8A" d="M82,508 H82 A2,2 0 0 1 84,510 V598 A2,2 0 0 1 82,600 H82 A2,2 0 0 1 80,598 V510 A2,2 0 0 1 82,508 Z" />
    <circle cx="128" cy="554" r="24" fill="#FF6B8A" fill-opacity="0.14" />
    
  <g transform="translate(112, 538) scale(1.33333)" fill="#FF8FA6">
    <path d="M17 20.66a10 10 0 0 1 -11.328 -.917l6.742 -6.743h9.536a10 10 0 0 1 -4.95 7.66m-6 -18.61v9.534l-6.743 6.744a10 10 0 0 1 -2.257 -6.328l.005 -.324a10 10 0 0 1 8.995 -9.626m6 1.29a10 10 0 0 1 4.95 7.66h-8.95v-8.95a10 10 0 0 1 4 1.29" />
  </g>
    <text x="174" y="548" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" font-weight="bold" fill="#EDE6EC">数据看不懂</text>
    <text x="174" y="580" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="17" fill="#A99FB0">记了一堆数字，却没有清晰的复盘</text>
  </g>

  <g id="insight">
    <path fill="#2E2238" stroke="#FF6B8A" stroke-opacity="0.3" stroke-width="1" d="M706,196 H1182 A18,18 0 0 1 1200,214 V582 A18,18 0 0 1 1182,600 H706 A18,18 0 0 1 688,582 V214 A18,18 0 0 1 706,196 Z" />
    <text x="724" y="258" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="20" font-weight="bold" fill="#FFD479">市场缺口在哪？</text>
    <text x="724" y="318" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="26" font-weight="bold" fill="#EDE6EC">现有产品的两个极端</text>
    <text x="724" y="370" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" fill="#A99FB0">· 要么<tspan fill="#FF8C6B" font-weight="bold">太重</tspan>：随手记、鲨鱼记账</text>
    <text x="724" y="412" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" fill="#A99FB0">· 要么<tspan fill="#FF8C6B" font-weight="bold">绑生态、分类粗</tspan>：支付宝记账本</text>
    <line x1="724" y1="446" x2="1164" y2="446" stroke="#3A2C44" stroke-width="1" />
    <text x="724" y="498" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="24" fill="#EDE6EC">真正的缺口是一款</text>
    <text x="724" y="540" font-family="&quot;Microsoft YaHei&quot;, SimHei, sans-serif" font-size="30" font-weight="bold" fill="#FF6B8A">够轻、无广告、能让人坚持</text>
    <text x="724" y="578" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="22" fill="#A99FB0">——这正是我们的<tspan fill="#FFD479" font-weight="bold">切入点</tspan>。</text>
  </g>

  <g id="footer">
    <text x="80" y="690" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="15" fill="#6E6076">每日记账 · 投资人路演</text>
    <text x="1200" y="690" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="15" fill="#6E6076">02 / 05</text>
  </g>
</svg>