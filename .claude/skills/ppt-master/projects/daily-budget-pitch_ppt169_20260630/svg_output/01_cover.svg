<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B8A" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FF6B8A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8C6B" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#FF8C6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="55%" stop-color="#FF8C6B"/>
      <stop offset="100%" stop-color="#FFD479"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#E84D6F"/>
    </linearGradient>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#1A1320"/>
    <circle cx="1120" cy="60" r="360" fill="url(#glowPink)"/>
    <circle cx="140" cy="700" r="300" fill="url(#glowOrange)"/>
  </g>

  <g id="logo-area">
    <rect x="80" y="92" width="56" height="56" rx="16" fill="url(#markGrad)"/>
    <text x="108" y="132" text-anchor="middle" font-size="30" fill="#FFFFFF">🐷</text>
    <text x="152" y="122" font-family="&quot;Microsoft YaHei&quot;, SimHei, sans-serif" font-size="24" font-weight="bold" fill="#EDE6EC">每日记账<tspan fill="#A99FB0" font-weight="normal" font-size="20">　DailyBudget</tspan></text>
  </g>

  <g id="cover-eyebrow">
    <rect x="80" y="246" width="246" height="38" rx="19" fill="#FF6B8A" fill-opacity="0.10" stroke="#FF6B8A" stroke-opacity="0.45" stroke-width="1"/>
    <text x="103" y="271" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="18" font-weight="bold" fill="#FF6B8A" letter-spacing="2">投资人路演 · 天使轮</text>
  </g>

  <g id="cover-title">
    <text x="78" y="386" font-family="&quot;Microsoft YaHei&quot;, SimHei, sans-serif" font-size="92" font-weight="bold" fill="#EDE6EC">让记账像</text>
    <text x="78" y="498" font-family="&quot;Microsoft YaHei&quot;, SimHei, sans-serif" font-size="92" font-weight="bold" fill="url(#titleGrad)">「发朋友圈」一样轻</text>
  </g>

  <g id="cover-slogan">
    <rect x="82" y="540" width="6" height="30" rx="3" fill="#FFD479"/>
    <text x="104" y="565" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="26" font-weight="bold" fill="#FFD479">一秒记账，清楚花钱</text>
  </g>

  <g id="cover-lead">
    <text x="80" y="618" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="24" fill="#A99FB0">用<tspan fill="#EDE6EC" font-weight="bold">极致轻量</tspan>＋<tspan fill="#EDE6EC" font-weight="bold">习惯养成</tspan>，解决记账产品「留不住人」的根本问题</text>
  </g>

  <g id="cover-footer">
    <line x1="80" y1="664" x2="1200" y2="664" stroke="#3A2C44" stroke-width="1"/>
    <text x="80" y="692" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="16" fill="#A99FB0">三端覆盖　Web · iOS · Android · 微信小程序</text>
    <text x="1200" y="692" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="16" fill="#A99FB0">2026.06　寻求天使轮融资</text>
  </g>
</svg>
